name: Deploy Website

on:
  push:
    branches:
      - main  # Ganti dengan 'master' jika branch utamamu bernama master

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
    
    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /public_html/ # Tujuan folder di hosting disesuaikan dengan kotak biru
        
        # ─── TAMBAHKAN OPSI DI BAWAH INI UNTUK MENANGGULANGI ECONNRESET ───
        protocol: ftp          # Memaksa koneksi menggunakan FTP aman (SSL/TLS)
        port: 21                # Gunakan port 21 (atau 990 jika hostingmu pakai implicit FTPS)
        timeout: 60000          # Menambah batas waktu tunggu respons server (60 detik)
        # ──────────────────────────────────────────────────────────────────

        exclude: |
          # --- Pengaturan Bawaan Git & GitHub ---
          **/.git*
          **/.git*/**
          **/.github/**
          
          
          # --- Tambahan dari .gitignore ---
          node_modules/**
          dist/**
          .vscode/**
          .idea/**
          **/*.suo
          **/*.ntvs*
          **/*.njsproj
          **/*.sln
          **/*.sw?
          **/.DS_Store
          **/Thumbs.db
          **/*.log
          npm-debug.log*
          .env
          .env.local
          .env.*.local
          
          # --- Folder Bawaan cPanel (Penting) ---
          cgi-bin/**
